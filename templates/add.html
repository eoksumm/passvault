{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">Add password</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label class="form-label">Service Name</label>
            <input class="form-input" type="text" name="service_name"
                   placeholder="e.g. GitHub, Netflix, Gmail" required>
        </div>
        <div class="form-group">
            <label class="form-label">Username / Email</label>
            <input class="form-input" type="text" name="service_username"
                   placeholder="e.g. user@example.com" autocomplete="off" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <input class="form-input has-toggle" type="password" name="password" id="service-pw"
                       placeholder="Enter or paste password" autocomplete="off" required>
                <button type="button" class="toggle-vis" onclick="toggleVis('service-pw', this)" title="Toggle visibility">
                    <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save to Vault</button>
    </form>
    <div class="mt-3">
        <a class="link text-muted" href="{{ url_for('index') }}">&larr; Back to dashboard</a>
    </div>
</div>
{% endblock %}
