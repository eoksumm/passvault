{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">Generated password</h2>
    <p class="text-muted" style="margin-bottom:20px;">Copy it before leaving — it won't be saved automatically.</p>

    <div style="
        background: var(--surface-2);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-sm);
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
    ">
        <code id="gen-pw" style="font-size:15px;font-weight:500;color:var(--text);letter-spacing:1.5px;word-break:break-all;font-family:monospace;">{{ new_password }}</code>
        <button id="copy-btn" onclick="copyPw()" style="
            flex-shrink:0;
            background: var(--surface-3);
            color: var(--text-dim);
            border: 1px solid var(--border-2);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
            white-space: nowrap;
        ">Copy</button>
    </div>

    <a class="link text-muted" href="{{ url_for('index') }}">&larr; Back to dashboard</a>
</div>

<script>
function copyPw() {
    const pw = document.getElementById('gen-pw').textContent;
    navigator.clipboard.writeText(pw).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied';
        btn.style.color = '#4ade80';
        btn.style.borderColor = 'rgba(74,222,128,.3)';
        setTimeout(() => {
            btn.textContent = 'Copy';
            btn.style.color = '';
            btn.style.borderColor = '';
        }, 2000);
    });
}
</script>
{% endblock %}
