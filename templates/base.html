<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0c0c0c;
            --surface:   #141414;
            --surface-2: #1a1a1a;
            --surface-3: #202020;
            --border:    #242424;
            --border-2:  #2e2e2e;
            --text:      #e2e2e2;
            --text-dim:  #888;
            --text-muted:#555;
            --radius:    11px;
            --radius-sm: 8px;
            color-scheme: dark;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 52px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper {
            max-width: 760px;
            margin: 0 auto;
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 44px;
        }
        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -.3px;
        }

        /* Card */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 40px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 28px;
        }

        /* Flash messages */
        .flash-list {
            list-style: none;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .flash-list li {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            background: rgba(248, 113, 113, .08);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, .2);
        }
        .flash-list li.success {
            background: rgba(74, 222, 128, .07);
            color: #4ade80;
            border-color: rgba(74, 222, 128, .2);
        }

        /* Forms */
        .form-group { margin-bottom: 22px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-2);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            color: var(--text);
            background: var(--surface-2);
            transition: border-color .15s;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:focus {
            border-color: #484848;
            background: var(--surface-3);
        }
        .form-input.has-toggle { padding-right: 46px; }

        /* Kill browser autofill white flash */
        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:hover,
        .form-input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 100px #1a1a1a inset !important;
            -webkit-text-fill-color: #e2e2e2 !important;
            caret-color: #e2e2e2;
        }

        .toggle-vis {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer; padding: 4px;
            color: var(--text-muted);
            display: flex; align-items: center;
            transition: color .15s;
        }
        .toggle-vis:hover { color: var(--text-dim); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all .15s;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: #e2e2e2;
            color: #0c0c0c;
            width: 100%;
            font-weight: 600;
        }
        .btn-primary:hover { background: #fff; }

        .btn-sm {
            padding: 7px 14px;
            font-size: 13px;
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-2);
        }
        .btn-ghost:hover {
            background: var(--surface-2);
            color: var(--text);
            border-color: #444;
        }
        .btn-subtle {
            background: transparent;
            color: #f87171;
            border: 1px solid rgba(248,113,113,.25);
        }
        .btn-subtle:hover {
            background: rgba(248,113,113,.08);
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 26px 0;
        }

        .link { color: var(--text-dim); text-decoration: none; font-weight: 500; }
        .link:hover { color: var(--text); }

        .text-center { text-align: center; }
        .text-dim { color: var(--text-dim); }
        .text-muted { color: var(--text-muted); font-size: 14px; }
        .mt-3 { margin-top: 16px; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="brand">
            {% if session.get('user_id') %}
            <a href="{{ url_for('index') }}" class="brand-name" style="text-decoration:none;">PassVault</a>
            {% else %}
            <span class="brand-name">PassVault</span>
            {% endif %}
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-list">
            {% for category, message in messages %}
              <li class="{{ 'success' if category == 'success' else '' }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script>
    function toggleVis(inputId, btn) {
        const input = document.getElementById(inputId);
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        btn.querySelector('.icon-eye').style.display = showing ? 'block' : 'none';
        btn.querySelector('.icon-eye-off').style.display = showing ? 'none' : 'block';
    }
    </script>
</body>
</html>
